<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why Lead Magnets Are the #1 LinkedIn Growth Hack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; font-family: 'Inter', sans-serif; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .container { max-width: 900px; width: 100%; background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%); border: 1px solid #222222; border-radius: 16px; padding: 40px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }
        .header { text-align: center; margin-bottom: 36px; }
        .title { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #6366f1 0%, #a78bfa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #a0aec0; font-weight: 500; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; }
        .stat-card { background: linear-gradient(135deg, #1f1f3f 0%, #16213e 100%); border: 1px solid #2d2d5f; border-radius: 12px; padding: 28px; text-align: center; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(45deg, rgba(99, 102, 241, 0.1) 0%, transparent 100%); opacity: 0; transition: opacity 0.3s ease; }
        .stat-card:hover { border-color: #6366f1; transform: translateY(-4px); box-shadow: 0 12px 24px rgba(99, 102, 241, 0.2); }
        .stat-card:hover::before { opacity: 1; }
        .stat-value { font-size: 36px; font-weight: 700; color: #6366f1; margin-bottom: 12px; position: relative; z-index: 1; }
        .stat-label { font-size: 13px; color: #cbd5e1; line-height: 1.6; position: relative; z-index: 1; }
        .stat-description { font-size: 11px; color: #64748b; margin-top: 8px; position: relative; z-index: 1; }
        @media (max-width: 600px) { .container { padding: 24px; } .title { font-size: 18px; } .stat-card { padding: 20px; } .stat-value { font-size: 28px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">Why Lead Magnets Are the #1 LinkedIn Growth Hack</div>
            <div class="subtitle">The numbers don't lie</div>
        </div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">47%</div>
                <div class="stat-label">of LinkedIn users engage more with posts that link to a resource</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">3.2x</div>
                <div class="stat-label">more profile visits when you have a lead magnet vs standard posts</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">12 min</div>
                <div class="stat-label">average time to create a lead magnet with Cowork</div>
                <div class="stat-description">vs 40+ hours manually</div>
            </div>
        </div>
    </div>
</body>
</html>
